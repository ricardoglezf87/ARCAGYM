{% extends "base.html" %}
{% block title %}Registro | ARCA Gym{% endblock %}
{% block content %}
<section class="auth-shell wide">
  <div class="auth-panel">
    <p class="eyebrow">Primera configuracion</p>
    <h1>Crear usuario</h1>
    <p class="muted">Estos datos ayudan a personalizar estadisticas y recomendaciones.</p>

    {% if error %}<div class="alert">{{ error }}</div>{% endif %}

    <form method="post" action="/register" class="form-grid two">
      <label>Nombre
        <input name="name" value="{{ form.name or '' }}" required>
      </label>
      <label>Email
        <input name="email" type="email" value="{{ form.email or '' }}" required autocomplete="email">
      </label>
      <label>Contrasena
        <input name="password" type="password" required minlength="8" autocomplete="new-password">
      </label>
      <label>Confirmar contrasena
        <input name="password_confirm" type="password" required minlength="8" autocomplete="new-password">
      </label>
      <label>Edad
        <input name="age" type="number" min="12" max="100" value="{{ form.age or '' }}" required>
      </label>
      <label>Sexo (opcional)
        <input name="sex" value="{{ form.sex or '' }}" placeholder="Ej. hombre, mujer, no especificar">
      </label>
      <label>Altura (cm)
        <input name="height_cm" type="number" min="80" max="260" step="0.1" value="{{ form.height_cm or '' }}" required>
      </label>
      <label>Peso corporal (kg)
        <input name="body_weight_kg" type="number" min="20" max="350" step="0.1" value="{{ form.body_weight_kg or '' }}" required>
      </label>
      <label>Nivel
        <select name="experience_level">
          {% for level in experience_levels %}
            <option value="{{ level }}" {% if form.experience_level == level %}selected{% endif %}>{{ level|title }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Objetivo principal
        <select name="goal">
          {% for goal in goals %}
            <option value="{{ goal }}" {% if form.goal == goal %}selected{% endif %}>{{ goal|title }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Dias por semana
        <input name="days_per_week" type="number" min="1" max="7" value="{{ form.days_per_week or 3 }}" required>
      </label>
      <label>Minutos por sesion
        <input name="session_duration" type="number" min="15" max="240" value="{{ form.session_duration or 60 }}" required>
      </label>
      <label class="full">Lesiones, molestias o limitaciones
        <textarea name="limitations" rows="3">{{ form.limitations or '' }}</textarea>
      </label>
      <label class="full">Equipamiento disponible
        <textarea name="equipment_available" rows="3" placeholder="gimnasio completo, mancuernas, barra, maquinas, bandas, peso corporal">{{ form.equipment_available or 'gimnasio completo' }}</textarea>
      </label>
      <button class="button primary full" type="submit">Crear cuenta</button>
    </form>
    <p class="small">Ya tienes cuenta? <a href="/login">Inicia sesion</a></p>
  </div>
</section>
{% endblock %}
