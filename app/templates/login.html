{% extends "base.html" %}
{% block title %}Login | ARCA Gym{% endblock %}
{% block content %}
<section class="auth-shell">
  <div class="auth-panel">
    <p class="eyebrow">Entrena con datos</p>
    <h1>Iniciar sesion</h1>
    <p class="muted">Accede para registrar entrenamientos, ver progreso y generar rutinas.</p>

    {% if error %}<div class="alert">{{ error }}</div>{% endif %}

    <form method="post" action="/login" class="form-grid">
      <input type="hidden" name="next" value="{{ next }}">
      <label>Email
        <input name="email" type="email" value="{{ email or '' }}" required autocomplete="email">
      </label>
      <label>Contrasena
        <input name="password" type="password" required autocomplete="current-password">
      </label>
      <button class="button primary" type="submit">Entrar</button>
    </form>
    <p class="small">Aun no tienes cuenta? <a href="/register">Crear cuenta</a></p>
  </div>
</section>
{% endblock %}
